# Production Docker Compose Configuration
#
# This is a COMPLETE, SELF-CONTAINED production configuration file.
# It can be used standalone in Dokploy or any production environment.
#
# Key Production Features:
# - ASPNETCORE_ENVIRONMENT=Production
# - SQL Server port NOT exposed (security)
# - Resource limits configured
# - Log rotation enabled
# - Production logging levels
#
# Usage:
#   Dokploy: Use this file directly as "Docker Compose File Path"
#   Manual: docker compose -f docker-compose.prod.yml up -d

services:
  # SQL Server Express for Linux - Production Configuration
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: xafdocker-sqlserver-prod
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_SA_PASSWORD}
      - MSSQL_PID=Express
    # SECURITY: Port NOT exposed in production (internal network only)
    # For external access, use a secure tunnel or VPN
    ports: []
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./docker/sqlserver/init:/docker-entrypoint-initdb.d:ro
    networks:
      - xafdocker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C -b -o /dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # XAF Blazor Server Application - Production Configuration
  xafapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xafdocker-app-prod
    depends_on:
      - sqlserver
    environment:
      # PRODUCTION MODE
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__ConnectionString=Server=sqlserver,1433;Database=XAFDocker;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True
      - DevExpress__ExpressApp__Security__UrlSigningKey=${URL_SIGNING_KEY}
      # Production Logging Levels
      - Logging__LogLevel__Default=Warning
      - Logging__LogLevel__Microsoft=Warning
      - Logging__LogLevel__Microsoft.AspNetCore=Warning
    ports:
      - "5080:80"  # Maps host port 5080 to container port 80
                   # IMPORTANT: Traefik/Dokploy reverse proxy connects to container port 80 (not 5080)
                   # Configure your domain with Container Port = 80 in Dokploy
    networks:
      - xafdocker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

networks:
  xafdocker-network:
    driver: bridge

volumes:
  sqlserver-data:
    driver: local
