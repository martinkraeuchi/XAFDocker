# Production Configuration Overrides
#
# IMPORTANT: This is an OVERRIDE file, not a standalone compose file!
#
# For Dokploy Deployment:
#   - Use docker-compose.yml as your main compose file in Dokploy
#   - Apply production settings via ENVIRONMENT VARIABLES in Dokploy UI instead
#   - See DEPLOYMENT_DOKPLOY.md for the correct approach
#
# For Manual Deployment (with docker-compose command):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file only contains OVERRIDES and assumes docker-compose.yml is loaded first.

version: '3.3'

services:
  # SQL Server - Production Configuration
  sqlserver:
    # Remove port exposure for security (access via internal network only)
    ports: []

    # Add resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

    # Production logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # XAF Application - Production Configuration
  xafapp:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production  # Enable production mode
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__ConnectionString=Server=sqlserver,1433;Database=XAFDocker;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True
      - DevExpress__ExpressApp__Security__UrlSigningKey=${URL_SIGNING_KEY}
      # Production-specific settings
      - Logging__LogLevel__Default=Warning
      - Logging__LogLevel__Microsoft=Warning
      - Logging__LogLevel__Microsoft.AspNetCore=Warning

    # For production behind nginx, you can remove direct access port
    # ports: []  # Uncomment to disable direct access

    # Add resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

    # Production logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # nginx - Production Configuration
  nginx:
    # Add resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

    # Production logging
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"

  # certbot - Production Configuration
  certbot:
    # Production logging
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"
