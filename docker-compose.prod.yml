# Production Docker Compose Configuration
#
# This is a COMPLETE, SELF-CONTAINED production configuration file.
# It can be used standalone in Dokploy or any production environment.
#
# Key Production Features:
# - ASPNETCORE_ENVIRONMENT=Production
# - SQL Server port NOT exposed (security)
# - Resource limits configured
# - Log rotation enabled
# - Production logging levels
#
# Usage:
#   Dokploy: Use this file directly as "Docker Compose File Path"
#   Manual: docker compose -f docker-compose.prod.yml up -d

services:
  # SQL Server Express for Linux - Production Configuration
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: xafdocker-sqlserver-prod
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_SA_PASSWORD}
      - MSSQL_PID=Express
      # Force encrypted connections
      - MSSQL_ENCRYPT_CONNECTIONS=1
      - MSSQL_FORCE_ENCRYPTION=1
    # SQL Server port exposed for external connections
    # WARNING: Ensure strong SA password is set in environment variables
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./docker/sqlserver/init:/docker-entrypoint-initdb.d:ro
      - backup-data:/backups
      # Mount SSL certificates (create these files first)
      - ./docker/sqlserver/certs/mssql.pem:/var/opt/mssql/certs/mssql.pem:ro
      - ./docker/sqlserver/certs/mssql.key:/var/opt/mssql/certs/mssql.key:ro
    networks:
      - xafdocker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C -b -o /dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # XAF Blazor Server Application - Production Configuration
  xafapp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DevExpress_License=${DevExpress_License}
    container_name: xafdocker-app-prod
    depends_on:
      - sqlserver
    environment:
      # PRODUCTION MODE
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__ConnectionString=Server=sqlserver,1433;Database=XAFDocker;User Id=sa;Password=${SQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=True
      - DevExpress__ExpressApp__Security__UrlSigningKey=${URL_SIGNING_KEY}
      # Production Logging Levels
      - Logging__LogLevel__Default=Warning
      - Logging__LogLevel__Microsoft=Warning
      - Logging__LogLevel__Microsoft.AspNetCore=Warning
    ports:
      - "5080:80"  # Maps host port 5080 to container port 80
                   # IMPORTANT: Traefik/Dokploy reverse proxy connects to container port 80 (not 5080)
                   # Configure your domain with Container Port = 80 in Dokploy
    networks:
      - xafdocker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.00'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # Backup service for SQL Server
  # Note: Cron removed - scheduling handled by Dokploy Scheduled Tasks
  # Dokploy Command: docker exec xafdocker-backup /app/backup.sh
  backup:
    build:
      context: ./docker/backup
      dockerfile: Dockerfile.prod
    container_name: xafdocker-backup
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - SQL_SA_PASSWORD=${SQL_SA_PASSWORD}
      - SQL_SERVER=sqlserver
      - SQL_PORT=1433
      - SQL_USER=sa
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_DATABASE=${BACKUP_DATABASE:-XAFDocker}
      - TZ=${TZ:-UTC}
      - FTP_HOST=${FTP_HOST}
      - FTP_PORT=${FTP_PORT:-21}
      - FTP_USER=${FTP_USER}
      - FTP_PASSWORD=${FTP_PASSWORD}
      - FTP_PATH=${FTP_PATH}
      - FTP_USE_TLS=${FTP_USE_TLS:-true}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_ENABLED=${WEBHOOK_ENABLED:-false}
    volumes:
      - backup-data:/backups
    networks:
      - xafdocker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-x", "/app/backup.sh"]
      interval: 60s
      timeout: 3s
      retries: 3

networks:
  xafdocker-network:
    driver: bridge

volumes:
  sqlserver-data:
    driver: local
  backup-data:
    driver: local
