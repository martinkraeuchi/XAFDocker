
services:
  # SQL Server Express for Linux
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: xafdocker-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"  # Only exposed for development, remove in production
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./docker/sqlserver/init:/docker-entrypoint-initdb.d:ro
    networks:
      - xafdocker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C -b -o /dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10

  # XAF Blazor Server Application
  xafapp:
    build:
      context: .
      dockerfile: Dockerfile
      # Note: DevExpress_License build arg removed for local development
      # License is copied from .devexpress-license/ directory instead
      # This prevents environment variable interference with file-based license
    container_name: xafdocker-app
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__ConnectionString=Server=sqlserver,1433;Database=XAFDocker;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True
      - DevExpress__ExpressApp__Security__UrlSigningKey=${URL_SIGNING_KEY}
    ports:
      - "5080:80"  # Direct access to XAF app for testing/development
    networks:
      - xafdocker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Backup service for SQL Server
  backup:
    build:
      context: ./docker/backup
      dockerfile: Dockerfile
    container_name: xafdocker-backup
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - SQL_SA_PASSWORD=${SQL_SA_PASSWORD}
      - SQL_SERVER=sqlserver
      - SQL_PORT=1433
      - SQL_USER=sa
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-30 23 * * *}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_DATABASE=${BACKUP_DATABASE:-XAFDocker}
      - TZ=${TZ:-UTC}
      - FTP_HOST=${FTP_HOST}
      - FTP_PORT=${FTP_PORT:-21}
      - FTP_USER=${FTP_USER}
      - FTP_PASSWORD=${FTP_PASSWORD}
      - FTP_PATH=${FTP_PATH}
      - FTP_USE_TLS=${FTP_USE_TLS:-true}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_ENABLED=${WEBHOOK_ENABLED:-false}
    volumes:
      - backup-data:/backups
    networks:
      - xafdocker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "crond"]
      interval: 60s
      timeout: 3s
      retries: 3

networks:
  xafdocker-network:
    driver: bridge

volumes:
  sqlserver-data:
    driver: local
  backup-data:
    driver: local
