
services:
  # SQL Server Express for Linux
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: xafdocker-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"  # Only exposed for development, remove in production
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./docker/sqlserver/init:/docker-entrypoint-initdb.d:ro
    networks:
      - xafdocker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C -b -o /dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10

  # XAF Blazor Server Application
  xafapp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DevExpress_License=${DevExpress_License}
    container_name: xafdocker-app
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__ConnectionString=Server=sqlserver,1433;Database=XAFDocker;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True
      - DevExpress__ExpressApp__Security__UrlSigningKey=${URL_SIGNING_KEY}
    ports:
      - "5080:80"  # Direct access to XAF app for testing/development
    networks:
      - xafdocker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  xafdocker-network:
    driver: bridge

volumes:
  sqlserver-data:
    driver: local
